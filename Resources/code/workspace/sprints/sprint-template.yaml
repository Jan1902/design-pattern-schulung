# Sprint Template — nicht direkt verwenden, wird durch /sprint start erzeugt

id: SPRINT-XXX
goal: "..."
status: active  # active | closed
start: YYYY-MM-DD
end: YYYY-MM-DD  # typisch 1-2 Wochen

tasks:
  - id: TASK-XXX
    title: "..."
    status: backlog  # backlog | in_progress | done | carried_over

metrics:
  planned: 0
  completed: 0
  carried_over: 0

retro: null  # wird auf retro-Datei-Pfad gesetzt nach /retro
